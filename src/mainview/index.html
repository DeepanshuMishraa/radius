<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Radius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function() {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        document.body.style.backgroundColor = mq.matches ? '#000000' : '#e0dbd3';
        mq.addEventListener('change', function(e) {
          document.body.style.backgroundColor = e.matches ? '#000000' : '#e0dbd3';
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
