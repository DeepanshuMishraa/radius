<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Radius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function() {
        const theme = localStorage.getItem('vite-ui-theme') || 'dark';
        const appearance = localStorage.getItem('vite-ui-theme-appearance') || (theme === 'light' ? 'light' : 'dark');
        const rawVariables = localStorage.getItem('vite-ui-theme-vars');
        const root = document.documentElement;

        root.classList.add(appearance);
        root.dataset.theme = theme;
        root.style.colorScheme = appearance;

        if (!rawVariables) return;

        try {
          const variables = JSON.parse(rawVariables);
          for (const [key, value] of Object.entries(variables)) {
            root.style.setProperty(key, value);
          }
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
