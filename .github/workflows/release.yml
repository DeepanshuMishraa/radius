name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: artifacts/canary-macos-arm64-*.dmg
            asset_name: radius-macos-apple-silicon.dmg
            label: macOS Apple Silicon
          - os: macos-15-intel
            artifact_glob: artifacts/canary-macos-x64-*.dmg
            asset_name: radius-macos-intel.dmg
            label: macOS Intel
          - os: ubuntu-latest
            artifact_glob: artifacts/canary-linux-x64-*.tar.gz
            asset_name: radius-linux-x64.tar.gz
            label: Linux x64
          - os: windows-latest
            artifact_glob: artifacts/canary-win-x64-*.zip
            asset_name: radius-windows-x64.zip
            label: Windows x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app
        run: bun run build:canary

      - name: Package release asset
        id: artifact
        shell: bash
        run: |
          SRC=$(find artifacts -maxdepth 1 -type f -path "${{ matrix.artifact_glob }}" | head -n 1)
          if [ -z "$SRC" ]; then
            echo "Expected release artifact matching ${{ matrix.artifact_glob }} was not found"
            exit 1
          fi

          DST="artifacts/${{ matrix.asset_name }}"
          cp "$SRC" "$DST"
          echo "file=$DST" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.file }}
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
